name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q --tb=short

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && vars.TEARDROP_TEST_URL != ''
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        env:
          TEARDROP_TEST_URL: ${{ vars.TEARDROP_TEST_URL }}
          TEARDROP_TEST_EMAIL: ${{ secrets.TEARDROP_TEST_EMAIL }}
          TEARDROP_TEST_SECRET: ${{ secrets.TEARDROP_TEST_SECRET }}
        run: pytest tests/integration/ -v
